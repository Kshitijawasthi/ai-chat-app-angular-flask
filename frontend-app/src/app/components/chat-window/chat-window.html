<div class="chat-window">
  <!-- empty state -->
  @if (messages.length === 0 && !isLoading) {
    <div class="empty-state">
      <div class="empty-icon">🤖</div>
      <h3>AI is ready!</h3>
      <p>Ask me anything to get started</p>
    </div>
  }
  <!-- messages loop -->
  @for (msg of messages; track msg) {
    <div
      class="message-row"
      [class.user-row]="msg.role === 'user'"
      [class.bot-row]="msg.role === 'assistant'"
    >
      <div class="avatar">
        {{ msg.role === 'user' ? '👤' : '🤖' }}
      </div>

      <div
        class="bubble"
        [class.user-bubble]="msg.role === 'user'"
        [class.bot-bubble]="msg.role === 'assistant'"
      >
        {{ msg.content }}
      </div>
    </div>
  }

  <!-- loading spinner -->
  @if (isLoading) {
    <div class="message-row bot-row">
      <div class="avatar">🤖</div>
      <div class="bubble bot-bubble loading-bubble">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
  }
  <!-- scroll anchor -->
  <div #scrollBottom></div>
</div>
